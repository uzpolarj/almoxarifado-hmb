<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Almoxarifado HMB</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-body: #f0f4f8;
            --bg-app: #ffffff;
            --text: #1a2e3b;
            --primary: #0b3b5c;
            --accent: #00a1b0;
            --border: #dde5ed;
            --card: #fafcfd;
            --warning: #e68a2e;
            --danger: #c44536;
        }
        body.dark {
            --bg-body: #121826;
            --bg-app: #1e2432;
            --text: #e2e8f0;
            --border: #2d3748;
            --card: #2a3242;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body {
            background: var(--bg-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            transition: background 0.2s;
        }
        #app {
            max-width: 550px;
            width: 100%;
            background: var(--bg-app);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            color: var(--text);
            transition: background 0.2s;
        }
        .tela { display: none; }
        .tela.ativa { display: block; }
        h2 { color: var(--primary); margin-bottom: 20px; }
        input, select, button {
            width: 100%;
            padding: 14px;
            border-radius: 18px;
            border: 1.5px solid var(--border);
            margin-bottom: 12px;
            font-size: 16px;
            background: var(--bg-app);
            color: var(--text);
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        button.secondary {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        .badge {
            background: var(--primary);
            color: white;
            border-radius: 40px;
            padding: 4px 12px;
            font-weight: bold;
        }
        .item-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--card);
            border-radius: 16px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
        }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-app);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .flex-row { display: flex; gap: 8px; align-items: center; }
        .carrinho-resumo {
            background: var(--card);
            border-radius: 20px;
            padding: 16px;
            margin-top: 20px;
            border: 1px dashed var(--accent);
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="theme-toggle" id="themeToggle">🌙</div>
<div id="app">
    <!-- LOGIN -->
    <div id="telaLogin" class="tela ativa">
        <h2>🏥 HMB</h2>
        <input id="matricula" placeholder="Matrícula" value="Admin">
        <input id="senha" type="password" placeholder="Senha" value="HMB124">
        <select id="setorSelect"></select>
        <button id="btnLogin">Entrar</button>
    </div>

    <!-- DASHBOARD -->
    <div id="telaDashboard" class="tela">
        <div class="flex-row" style="justify-content:space-between;">
            <h2>Painel</h2>
            <button id="btnLogout" style="width:auto; padding:8px 16px;" class="secondary">Sair</button>
        </div>
        <p>👤 <span id="nomeFunc"></span> | 📍 <span id="setorAtual"></span></p>
        <div id="infoLimite" style="margin:16px 0; background:var(--card); padding:12px; border-radius:20px;"></div>
        <button id="btnNovoPedido">🧹 Novo Pedido</button>
        <button id="btnAdminPanel" class="secondary" style="display:none;">⚙️ Administração</button>
        <button id="btnHistorico" class="secondary">📋 Histórico do Setor</button>
        <div style="margin-top:24px;">
            <h3>📦 Últimos pedidos</h3>
            <div id="listaUltimosPedidos"></div>
        </div>
    </div>

    <!-- NOVO PEDIDO -->
    <div id="telaNovoPedido" class="tela">
        <button id="voltarDashboard" style="background:none; color:var(--primary); text-align:left; padding:8px 0; width:auto;">← Voltar</button>
        <h2>Novo Pedido</h2>
        <div id="containerItens" style="max-height:400px; overflow-y:auto;"></div>
        <div id="carrinhoPreview" class="carrinho-resumo">
            <span>🛒 Carrinho (<span id="contadorCarrinho">0</span>)</span>
            <span class="badge" id="btnVerResumo">Ver Resumo →</span>
        </div>
    </div>

    <!-- RESUMO DO PEDIDO -->
    <div id="telaResumo" class="tela">
        <button id="voltarParaItens" style="background:none; color:var(--primary); text-align:left;">← Continuar adicionando</button>
        <h2>Resumo do Pedido</h2>
        <p><strong>Setor:</strong> <span id="resumoSetor"></span></p>
        <div id="listaResumo" style="max-height:300px; overflow-y:auto;"></div>
        <div style="margin-top:16px; border-top:1px solid var(--border); padding-top:16px;">
            <label>✍️ Assinatura (nome completo)</label>
            <input id="assinaturaPedido" placeholder="Digite seu nome">
            <button id="btnConfirmarPedido">✅ Confirmar Pedido</button>
        </div>
    </div>

    <!-- CONFIRMAÇÃO -->
    <div id="telaConfirmacao" class="tela">
        <div style="text-align:center; margin-top:40px;">
            <div style="font-size:64px;">✅</div>
            <h2>Pedido Enviado!</h2>
            <p>Número: <strong id="numPedidoConfirmado"></strong></p>
            <p>Status: <span class="badge" style="background:var(--accent);">Feito</span></p>
            <button id="btnNovoPedidoPosConfirmacao" class="secondary">Fazer novo pedido</button>
            <button id="btnVoltarDashboardPosConfirmacao">Voltar ao painel</button>
        </div>
    </div>
</div>

<script>
    // ==================== CONFIGURAÇÃO (JÁ PREENCHIDA) ====================
    const SUPABASE_URL = 'https://avlhwbjpypdacfxkhatx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_eYkmeJqpLue8XuffpRWCyQ_r2hoCLWL';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ==================== ESTADO ====================
    let usuarioAtual = null;
    let carrinho = [];
    let catalogoCompleto = [];

    // ==================== TEMA ESCURO ====================
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        themeToggle.textContent = '☀️';
    }
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        themeToggle.textContent = isDark ? '☀️' : '🌙';
    });

    // ==================== FUNÇÕES DE TELA ====================
    function mostrarTela(id) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.getElementById(id).classList.add('ativa');
        if (id === 'telaDashboard') carregarDashboard();
        if (id === 'telaNovoPedido') carregarCatalogo();
        if (id === 'telaResumo') renderizarResumo();
    }

    // ==================== CARREGAR SETORES ====================
    async function carregarSetoresSelect() {
        const { data } = await supabase.from('setores').select('*').eq('ativo', true);
        const select = document.getElementById('setorSelect');
        if (data) select.innerHTML = data.map(s => `<option>${s.nome}</option>`).join('');
    }
    carregarSetoresSelect();

    // ==================== LOGIN ====================
    document.getElementById('btnLogin').addEventListener('click', async () => {
        const mat = document.getElementById('matricula').value.trim();
        const senha = document.getElementById('senha').value;
        const setor = document.getElementById('setorSelect').value;
        const { data: func, error } = await supabase.from('funcionarias')
            .select('*').eq('matricula', mat).eq('senha', senha).single();
        if (error || !func) return alert('Credenciais inválidas');
        usuarioAtual = { ...func, setor };
        mostrarTela('telaDashboard');
    });

    // ==================== DASHBOARD ====================
    async function carregarDashboard() {
        document.getElementById('nomeFunc').innerText = usuarioAtual.nome;
        document.getElementById('setorAtual').innerText = usuarioAtual.setor;
        const isAlmox = usuarioAtual.setor.includes('Almoxarifado');
        document.getElementById('btnAdminPanel').style.display = isAlmox ? 'block' : 'none';
        document.getElementById('infoLimite').innerHTML = isAlmox 
            ? '<span class="badge" style="background:var(--danger);">🔓 Almoxarifado - Sem limites</span>'
            : '📊 Limite: 1 pedido/dia (Seg-Qui), 2 (Sex)';
        const { data: pedidos } = await supabase.from('pedidos')
            .select('*').eq('setor', usuarioAtual.setor).order('data', { ascending: false }).limit(5);
        const div = document.getElementById('listaUltimosPedidos');
        div.innerHTML = pedidos?.length ? pedidos.map(p => 
            `<div class="item-card"><div><b>#${String(p.id).slice(-6)}</b> - ${new Date(p.data).toLocaleString()}<br>${p.itens.length} itens • ${p.status}</div></div>`
        ).join('') : '<p>Nenhum pedido recente.</p>';
    }

    // ==================== CATÁLOGO ====================
    async function carregarCatalogo() {
        const { data } = await supabase.from('catalogo').select('*').eq('ativo', true);
        catalogoCompleto = data || [];
        const container = document.getElementById('containerItens');
        container.innerHTML = catalogoCompleto.map(item => `
            <div class="item-card">
                <div><b>${item.nome}</b><br><small>${item.unidade} | Estoque: ${item.estoque}</small></div>
                <button class="badge" data-id="${item.id}" data-nome="${item.nome}" data-unidade="${item.unidade}">+</button>
            </div>
        `).join('');
        document.querySelectorAll('[data-id]').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.dataset.id;
                const nome = btn.dataset.nome;
                const unidade = btn.dataset.unidade;
                const existente = carrinho.find(i => i.id === id);
                existente ? existente.quantidade++ : carrinho.push({ id, nome, unidade, quantidade: 1 });
                atualizarContadorCarrinho();
            });
        });
        atualizarContadorCarrinho();
    }

    function atualizarContadorCarrinho() {
        const total = carrinho.reduce((s, i) => s + i.quantidade, 0);
        document.getElementById('contadorCarrinho').innerText = total;
    }

    // ==================== RESUMO ====================
    function renderizarResumo() {
        document.getElementById('resumoSetor').innerText = usuarioAtual.setor;
        const div = document.getElementById('listaResumo');
        div.innerHTML = carrinho.map(i => `<div class="item-card"><span>${i.quantidade}x ${i.nome} (${i.unidade})</span></div>`).join('');
    }

    // ==================== EVENT LISTENERS ====================
    document.getElementById('btnLogout').addEventListener('click', () => { usuarioAtual = null; carrinho = []; mostrarTela('telaLogin'); });
    document.getElementById('btnNovoPedido').addEventListener('click', () => { carrinho = []; mostrarTela('telaNovoPedido'); });
    document.getElementById('voltarDashboard').addEventListener('click', () => mostrarTela('telaDashboard'));
    document.getElementById('btnVerResumo').addEventListener('click', () => { if(carrinho.length) mostrarTela('telaResumo'); else alert('Carrinho vazio'); });
    document.getElementById('voltarParaItens').addEventListener('click', () => mostrarTela('telaNovoPedido'));
    
    document.getElementById('btnConfirmarPedido').addEventListener('click', async () => {
        if (!carrinho.length) return alert('Carrinho vazio');
        const assinatura = document.getElementById('assinaturaPedido').value || usuarioAtual.nome;
        const pedido = {
            id: Date.now(),
            setor: usuarioAtual.setor,
            funcionaria_matricula: usuarioAtual.matricula,
            itens: carrinho,
            status: 'Feito',
            dia_retirada: 'Próximo dia útil',
            assinatura
        };
        const { error } = await supabase.from('pedidos').insert(pedido);
        if (error) return alert('Erro: ' + error.message);
        document.getElementById('numPedidoConfirmado').innerText = `#${String(pedido.id).slice(-6)}`;
        carrinho = [];
        mostrarTela('telaConfirmacao');
    });

    document.getElementById('btnNovoPedidoPosConfirmacao').addEventListener('click', () => { carrinho = []; mostrarTela('telaNovoPedido'); });
    document.getElementById('btnVoltarDashboardPosConfirmacao').addEventListener('click', () => mostrarTela('telaDashboard'));
    document.getElementById('btnAdminPanel').addEventListener('click', () => alert('Painel administrativo em desenvolvimento.'));
    document.getElementById('btnHistorico').addEventListener('click', () => alert('Histórico completo em breve.'));
</script>
</body>
</html>
